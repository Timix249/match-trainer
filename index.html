<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mathe Trainer</title>

<style>

body{
font-family: Arial;
padding:30px;
background:#f5f5f5;
}

h1{
margin-bottom:20px;
}

.task{
margin:6px 0;
font-size:18px;
}

input{
width:70px;
font-size:18px;
padding:4px;
margin-left:5px;
}

.correct{
background:#8cff8c;
}

.wrong{
background:#ff8c8c;
}

button{
margin-top:25px;
font-size:20px;
padding:12px 25px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Mathe Aufgaben</h1>

<div id="tasks"></div>

<button onclick="checkAnswers()">Prüfen</button>

<div id="result"></div>

<script>

let tasks = []
let answers = []

function random(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function createTasks(){

let container = document.getElementById("tasks")

for(let i=0;i<25;i++){

let a=random(10,99)
let b=random(10,99)

tasks.push(a+" + "+b)
answers.push(a+b)

}

for(let i=0;i<25;i++){

let a=random(20,99)
let b=random(10,19)

tasks.push(a+" - "+b)
answers.push(a-b)

}

for(let i=0;i<25;i++){

let a=random(2,9)
let b=random(2,9)

tasks.push(a+" × "+b)
answers.push(a*b)

}

for(let i=0;i<25;i++){

let b=random(2,9)
let result=random(2,9)
let a=b*result

tasks.push(a+" : "+b)
answers.push(result)

}

tasks.push("125 + 375")
answers.push(500)

tasks.push("999 - 444")
answers.push(555)

tasks.push("12 × 12")
answers.push(144)

for(let i=0;i<tasks.length;i++){

let div=document.createElement("div")
div.className="task"

div.innerHTML=(i+1)+") "+tasks[i]+" = <input id='q"+i+"'>"

container.appendChild(div)

}

}

function checkAnswers(){

let correct=0

for(let i=0;i<answers.length;i++){

let input=document.getElementById("q"+i)

let value=Number(input.value)

input.classList.remove("correct","wrong")

if(value===answers[i]){

input.classList.add("correct")
correct++

}else{

input.classList.add("wrong")

}

}

document.getElementById("result").innerHTML="Richtig: "+correct+" / "+answers.length

}

createTasks()

</script>

</body>
</html>
