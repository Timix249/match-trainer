<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mathe Trainer</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
padding:40px;
}

.app{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
margin-top:0;
}

select,button{
font-size:16px;
padding:8px 14px;
margin:10px 5px;
}

.task{
margin:6px 0;
font-size:18px;
}

input{
width:70px;
font-size:18px;
padding:4px;
}

.correct{
background:#9cff9c;
}

.wrong{
background:#ff9c9c;
}

#score{
margin-top:15px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="app">

<h1>Mathe Trainer</h1>

<label>Schwierigkeit:</label>

<select id="level">
<option value="easy">Leicht</option>
<option value="medium">Mittel</option>
<option value="hard">Schwer</option>
</select>

<button onclick="generate()">Neue Aufgaben</button> <button onclick="check()">Prüfen</button>

<div id="tasks"></div>

<div id="score">Richtig: 0</div>
<div id="record"></div>

</div>

<script>

let answers=[]
let record=localStorage.getItem("record") || 0

document.getElementById("record").innerText="🏆 Rekord: "+record

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function generate(){

let container=document.getElementById("tasks")
container.innerHTML=""

answers=[]

let level=document.getElementById("level").value

let min=1
let max=10

if(level==="medium"){
min=10
max=50
}

if(level==="hard"){
min=50
max=200
}

for(let i=0;i<20;i++){

let type=rand(1,4)
let a=rand(min,max)
let b=rand(min,max)

let task=""
let result=0

if(type===1){
task=a+" + "+b
result=a+b
}

if(type===2){
task=a+" - "+b
result=a-b
}

if(type===3){
task=a+" × "+b
result=a*b
}

if(type===4){
b=rand(1,10)
let c=rand(1,10)
a=b*c
task=a+" : "+b
result=c
}

answers.push(result)

let div=document.createElement("div")
div.className="task"

div.innerHTML=(i+1)+") "+task+" = <input id='q"+i+"'>"

container.appendChild(div)

}

document.getElementById("score").innerText="Richtig: 0"

}

function check(){

let correct=0

for(let i=0;i<answers.length;i++){

let input=document.getElementById("q"+i)
let value=Number(input.value)

input.classList.remove("correct","wrong")

if(value===answers[i]){

input.classList.add("correct")
correct++

}else{

input.classList.add("wrong")

}

}

document.getElementById("score").innerText="Richtig: "+correct+" / "+answers.length

if(correct>record){

record=correct
localStorage.setItem("record",record)

document.getElementById("record").innerText="🏆 Rekord: "+record

}

}

generate()

</script>

</body>
</html>
